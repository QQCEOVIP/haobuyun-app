
<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 蓝紫 -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 浅紫 -->
    <linearGradient id="cloudGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.92" stdDeviation="3.84" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    
    <!-- 内阴影 -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.44" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景圆形/圆角方形 -->
  <rect x="8" y="8" width="80" height="80" rx="17.6" ry="17.6" fill="url(#cloudGradient)"/>
  
  <!-- 云朵形状 (左上部分) -->
  <g transform="translate(9.600000000000001, 7.68)" filter="url(#shadow)">
    <!-- 云朵主体 -->
    <ellipse cx="21.12" cy="24" rx="15.36" ry="11.52" fill="white" opacity="0.95"/>
    <ellipse cx="36.480000000000004" cy="19.200000000000003" rx="13.440000000000001" ry="10.56" fill="white" opacity="0.95"/>
    <ellipse cx="28.799999999999997" cy="26.880000000000003" rx="11.52" ry="8.64" fill="white" opacity="0.95"/>
    <!-- 云朵底部 -->
    <rect x="13.440000000000001" y="24" width="30.72" height="9.600000000000001" fill="white" opacity="0.95"/>
  </g>
  
  <!-- 通讯录/笔记本 (右下方) -->
  <g transform="translate(30.72, 36.480000000000004)">
    <!-- 笔记本主体 -->
    <rect x="0" y="0" width="40.32" height="46.08" rx="2.88" fill="white" opacity="0.95"/>
    
    <!-- 书脊/装订线 -->
    <rect x="1.92" y="0" width="3.84" height="46.08" fill="url(#cloudGradient2)" opacity="0.8"/>
    
    <!-- 页面线 -->
    <line x1="9.600000000000001" y1="11.52" x2="36.480000000000004" y2="11.52" stroke="#E5E7EB" stroke-width="1.44" stroke-linecap="round"/>
    <line x1="9.600000000000001" y1="21.12" x2="33.599999999999994" y2="21.12" stroke="#E5E7EB" stroke-width="1.44" stroke-linecap="round"/>
    <line x1="9.600000000000001" y1="30.72" x2="36.480000000000004" y2="30.72" stroke="#E5E7EB" stroke-width="1.44" stroke-linecap="round"/>
    <line x1="9.600000000000001" y1="40.32" x2="30.72" y2="40.32" stroke="#E5E7EB" stroke-width="1.44" stroke-linecap="round"/>
    
    <!-- 人像占位符（联系人图标） -->
    <circle cx="24" cy="36.480000000000004" r="4.800000000000001" fill="url(#cloudGradient2)" opacity="0.7"/>
    <ellipse cx="24" cy="44.160000000000004" rx="6.720000000000001" ry="3.84" fill="url(#cloudGradient2)" opacity="0.5"/>
  </g>
  
  <!-- 装饰点（数据节点） -->
  <circle cx="17.28" cy="69.12" r="2.4000000000000004" fill="white" opacity="0.6"/>
  <circle cx="26.880000000000003" cy="74.88" r="1.92" fill="white" opacity="0.5"/>
  
  <!-- 高光层 -->
  <ellipse cx="28.799999999999997" cy="19.200000000000003" rx="24" ry="7.68" fill="white" opacity="0.1"/>
</svg>
