
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 蓝紫 -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 浅紫 -->
    <linearGradient id="cloudGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10.24" stdDeviation="20.48" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    
    <!-- 内阴影 -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="7.68" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景圆形/圆角方形 -->
  <rect x="41" y="41" width="430" height="430" rx="94.6" ry="94.6" fill="url(#cloudGradient)"/>
  
  <!-- 云朵形状 (左上部分) -->
  <g transform="translate(51.2, 40.96)" filter="url(#shadow)">
    <!-- 云朵主体 -->
    <ellipse cx="112.64" cy="128" rx="81.92" ry="61.44" fill="white" opacity="0.95"/>
    <ellipse cx="194.56" cy="102.4" rx="71.68" ry="56.32" fill="white" opacity="0.95"/>
    <ellipse cx="153.6" cy="143.36" rx="61.44" ry="46.08" fill="white" opacity="0.95"/>
    <!-- 云朵底部 -->
    <rect x="71.68" y="128" width="163.84" height="51.2" fill="white" opacity="0.95"/>
  </g>
  
  <!-- 通讯录/笔记本 (右下方) -->
  <g transform="translate(163.84, 194.56)">
    <!-- 笔记本主体 -->
    <rect x="0" y="0" width="215.04" height="245.76" rx="15.36" fill="white" opacity="0.95"/>
    
    <!-- 书脊/装订线 -->
    <rect x="10.24" y="0" width="20.48" height="245.76" fill="url(#cloudGradient2)" opacity="0.8"/>
    
    <!-- 页面线 -->
    <line x1="51.2" y1="61.44" x2="194.56" y2="61.44" stroke="#E5E7EB" stroke-width="7.68" stroke-linecap="round"/>
    <line x1="51.2" y1="112.64" x2="179.2" y2="112.64" stroke="#E5E7EB" stroke-width="7.68" stroke-linecap="round"/>
    <line x1="51.2" y1="163.84" x2="194.56" y2="163.84" stroke="#E5E7EB" stroke-width="7.68" stroke-linecap="round"/>
    <line x1="51.2" y1="215.04" x2="163.84" y2="215.04" stroke="#E5E7EB" stroke-width="7.68" stroke-linecap="round"/>
    
    <!-- 人像占位符（联系人图标） -->
    <circle cx="128" cy="194.56" r="25.6" fill="url(#cloudGradient2)" opacity="0.7"/>
    <ellipse cx="128" cy="235.52" rx="35.84" ry="20.48" fill="url(#cloudGradient2)" opacity="0.5"/>
  </g>
  
  <!-- 装饰点（数据节点） -->
  <circle cx="92.16" cy="368.64" r="12.8" fill="white" opacity="0.6"/>
  <circle cx="143.36" cy="399.36" r="10.24" fill="white" opacity="0.5"/>
  
  <!-- 高光层 -->
  <ellipse cx="153.6" cy="102.4" rx="128" ry="40.96" fill="white" opacity="0.1"/>
</svg>
