
<svg width="144" height="144" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 蓝紫 -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 浅紫 -->
    <linearGradient id="cloudGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.88" stdDeviation="5.76" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    
    <!-- 内阴影 -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2.16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景圆形/圆角方形 -->
  <rect x="12" y="12" width="120" height="120" rx="26.4" ry="26.4" fill="url(#cloudGradient)"/>
  
  <!-- 云朵形状 (左上部分) -->
  <g transform="translate(14.4, 11.52)" filter="url(#shadow)">
    <!-- 云朵主体 -->
    <ellipse cx="31.68" cy="36" rx="23.04" ry="17.28" fill="white" opacity="0.95"/>
    <ellipse cx="54.72" cy="28.8" rx="20.160000000000004" ry="15.84" fill="white" opacity="0.95"/>
    <ellipse cx="43.199999999999996" cy="40.32000000000001" rx="17.28" ry="12.959999999999999" fill="white" opacity="0.95"/>
    <!-- 云朵底部 -->
    <rect x="20.160000000000004" y="36" width="46.08" height="14.4" fill="white" opacity="0.95"/>
  </g>
  
  <!-- 通讯录/笔记本 (右下方) -->
  <g transform="translate(46.08, 54.72)">
    <!-- 笔记本主体 -->
    <rect x="0" y="0" width="60.48" height="69.12" rx="4.32" fill="white" opacity="0.95"/>
    
    <!-- 书脊/装订线 -->
    <rect x="2.88" y="0" width="5.76" height="69.12" fill="url(#cloudGradient2)" opacity="0.8"/>
    
    <!-- 页面线 -->
    <line x1="14.4" y1="17.28" x2="54.72" y2="17.28" stroke="#E5E7EB" stroke-width="2.16" stroke-linecap="round"/>
    <line x1="14.4" y1="31.68" x2="50.4" y2="31.68" stroke="#E5E7EB" stroke-width="2.16" stroke-linecap="round"/>
    <line x1="14.4" y1="46.08" x2="54.72" y2="46.08" stroke="#E5E7EB" stroke-width="2.16" stroke-linecap="round"/>
    <line x1="14.4" y1="60.48" x2="46.08" y2="60.48" stroke="#E5E7EB" stroke-width="2.16" stroke-linecap="round"/>
    
    <!-- 人像占位符（联系人图标） -->
    <circle cx="36" cy="54.72" r="7.2" fill="url(#cloudGradient2)" opacity="0.7"/>
    <ellipse cx="36" cy="66.24000000000001" rx="10.080000000000002" ry="5.76" fill="url(#cloudGradient2)" opacity="0.5"/>
  </g>
  
  <!-- 装饰点（数据节点） -->
  <circle cx="25.919999999999998" cy="103.67999999999999" r="3.6" fill="white" opacity="0.6"/>
  <circle cx="40.32000000000001" cy="112.32000000000001" r="2.88" fill="white" opacity="0.5"/>
  
  <!-- 高光层 -->
  <ellipse cx="43.199999999999996" cy="28.8" rx="36" ry="11.52" fill="white" opacity="0.1"/>
</svg>
