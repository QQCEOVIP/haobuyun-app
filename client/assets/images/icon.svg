  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 云朵 -->
  <g fill="white" opacity="0.9">
    <circle cx="256" cy="140" r="55"/>
    <circle cx="310" cy="140" r="45"/>
    <circle cx="360" cy="150" r="40"/>
    <circle cx="256" cy="175" r="60"/>
  </g>
  <!-- 笔记本 -->
  <rect x="146" y="190" width="220" height="280" rx="20" fill="white"/>
