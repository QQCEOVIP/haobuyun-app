  <!-- 圆孔 -->
  <circle cx="161" cy="260" r="10" fill="white"/>
  <circle cx="161" cy="330" r="10" fill="white"/>
  <circle cx="161" cy="400" r="10" fill="white"/>
  <!-- 横线 -->
  <g stroke="#e0e0e0" stroke-width="3">
    <line x1="200" y1="250" x2="340" y2="250"/>
    <line x1="200" y1="290" x2="340" y2="290"/>
    <line x1="200" y1="330" x2="340" y2="330"/>
    <line x1="200" y1="370" x2="340" y2="370"/>
    <line x1="200" y1="410" x2="340" y2="410"/>
