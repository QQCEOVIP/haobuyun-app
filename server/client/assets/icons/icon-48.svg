
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 蓝紫 -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 浅紫 -->
    <linearGradient id="cloudGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.96" stdDeviation="1.92" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    
    <!-- 内阴影 -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="0.72" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景圆形/圆角方形 -->
  <rect x="4" y="4" width="40" height="40" rx="8.8" ry="8.8" fill="url(#cloudGradient)"/>
  
  <!-- 云朵形状 (左上部分) -->
  <g transform="translate(4.800000000000001, 3.84)" filter="url(#shadow)">
    <!-- 云朵主体 -->
    <ellipse cx="10.56" cy="12" rx="7.68" ry="5.76" fill="white" opacity="0.95"/>
    <ellipse cx="18.240000000000002" cy="9.600000000000001" rx="6.720000000000001" ry="5.28" fill="white" opacity="0.95"/>
    <ellipse cx="14.399999999999999" cy="13.440000000000001" rx="5.76" ry="4.32" fill="white" opacity="0.95"/>
    <!-- 云朵底部 -->
    <rect x="6.720000000000001" y="12" width="15.36" height="4.800000000000001" fill="white" opacity="0.95"/>
  </g>
  
  <!-- 通讯录/笔记本 (右下方) -->
  <g transform="translate(15.36, 18.240000000000002)">
    <!-- 笔记本主体 -->
    <rect x="0" y="0" width="20.16" height="23.04" rx="1.44" fill="white" opacity="0.95"/>
    
    <!-- 书脊/装订线 -->
    <rect x="0.96" y="0" width="1.92" height="23.04" fill="url(#cloudGradient2)" opacity="0.8"/>
    
    <!-- 页面线 -->
    <line x1="4.800000000000001" y1="5.76" x2="18.240000000000002" y2="5.76" stroke="#E5E7EB" stroke-width="0.72" stroke-linecap="round"/>
    <line x1="4.800000000000001" y1="10.56" x2="16.799999999999997" y2="10.56" stroke="#E5E7EB" stroke-width="0.72" stroke-linecap="round"/>
    <line x1="4.800000000000001" y1="15.36" x2="18.240000000000002" y2="15.36" stroke="#E5E7EB" stroke-width="0.72" stroke-linecap="round"/>
    <line x1="4.800000000000001" y1="20.16" x2="15.36" y2="20.16" stroke="#E5E7EB" stroke-width="0.72" stroke-linecap="round"/>
    
    <!-- 人像占位符（联系人图标） -->
    <circle cx="12" cy="18.240000000000002" r="2.4000000000000004" fill="url(#cloudGradient2)" opacity="0.7"/>
    <ellipse cx="12" cy="22.080000000000002" rx="3.3600000000000003" ry="1.92" fill="url(#cloudGradient2)" opacity="0.5"/>
  </g>
  
  <!-- 装饰点（数据节点） -->
  <circle cx="8.64" cy="34.56" r="1.2000000000000002" fill="white" opacity="0.6"/>
  <circle cx="13.440000000000001" cy="37.44" r="0.96" fill="white" opacity="0.5"/>
  
  <!-- 高光层 -->
  <ellipse cx="14.399999999999999" cy="9.600000000000001" rx="12" ry="3.84" fill="white" opacity="0.1"/>
</svg>
