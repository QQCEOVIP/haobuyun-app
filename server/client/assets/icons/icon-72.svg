
<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 蓝紫 -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 浅紫 -->
    <linearGradient id="cloudGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.44" stdDeviation="2.88" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    
    <!-- 内阴影 -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.08" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景圆形/圆角方形 -->
  <rect x="6" y="6" width="60" height="60" rx="13.2" ry="13.2" fill="url(#cloudGradient)"/>
  
  <!-- 云朵形状 (左上部分) -->
  <g transform="translate(7.2, 5.76)" filter="url(#shadow)">
    <!-- 云朵主体 -->
    <ellipse cx="15.84" cy="18" rx="11.52" ry="8.64" fill="white" opacity="0.95"/>
    <ellipse cx="27.36" cy="14.4" rx="10.080000000000002" ry="7.92" fill="white" opacity="0.95"/>
    <ellipse cx="21.599999999999998" cy="20.160000000000004" rx="8.64" ry="6.4799999999999995" fill="white" opacity="0.95"/>
    <!-- 云朵底部 -->
    <rect x="10.080000000000002" y="18" width="23.04" height="7.2" fill="white" opacity="0.95"/>
  </g>
  
  <!-- 通讯录/笔记本 (右下方) -->
  <g transform="translate(23.04, 27.36)">
    <!-- 笔记本主体 -->
    <rect x="0" y="0" width="30.24" height="34.56" rx="2.16" fill="white" opacity="0.95"/>
    
    <!-- 书脊/装订线 -->
    <rect x="1.44" y="0" width="2.88" height="34.56" fill="url(#cloudGradient2)" opacity="0.8"/>
    
    <!-- 页面线 -->
    <line x1="7.2" y1="8.64" x2="27.36" y2="8.64" stroke="#E5E7EB" stroke-width="1.08" stroke-linecap="round"/>
    <line x1="7.2" y1="15.84" x2="25.2" y2="15.84" stroke="#E5E7EB" stroke-width="1.08" stroke-linecap="round"/>
    <line x1="7.2" y1="23.04" x2="27.36" y2="23.04" stroke="#E5E7EB" stroke-width="1.08" stroke-linecap="round"/>
    <line x1="7.2" y1="30.24" x2="23.04" y2="30.24" stroke="#E5E7EB" stroke-width="1.08" stroke-linecap="round"/>
    
    <!-- 人像占位符（联系人图标） -->
    <circle cx="18" cy="27.36" r="3.6" fill="url(#cloudGradient2)" opacity="0.7"/>
    <ellipse cx="18" cy="33.120000000000005" rx="5.040000000000001" ry="2.88" fill="url(#cloudGradient2)" opacity="0.5"/>
  </g>
  
  <!-- 装饰点（数据节点） -->
  <circle cx="12.959999999999999" cy="51.839999999999996" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="20.160000000000004" cy="56.160000000000004" r="1.44" fill="white" opacity="0.5"/>
  
  <!-- 高光层 -->
  <ellipse cx="21.599999999999998" cy="14.4" rx="18" ry="5.76" fill="white" opacity="0.1"/>
</svg>
